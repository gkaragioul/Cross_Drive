name: crossdrive-release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  signed-release:
    runs-on: windows-latest
    if: ${{ secrets.MACMOUNT_PFX_BASE64 != '' && secrets.MACMOUNT_PFX_PASSWORD != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore dependencies
        run: npm ci

      - name: Materialize signing certificate
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build/certs | Out-Null
          [IO.File]::WriteAllBytes("build/certs/macmount-release.pfx", [Convert]::FromBase64String("${{ secrets.MACMOUNT_PFX_BASE64 }}"))

      - name: Configure signing env
        shell: pwsh
        run: |
          npm run signing:setup:real -- -PfxPath "build/certs/macmount-release.pfx" -PfxPassword "${{ secrets.MACMOUNT_PFX_PASSWORD }}"
          $env:CSC_LINK = [Environment]::GetEnvironmentVariable("CSC_LINK","User")
          $env:CSC_KEY_PASSWORD = [Environment]::GetEnvironmentVariable("CSC_KEY_PASSWORD","User")
          $env:WIN_CSC_LINK = [Environment]::GetEnvironmentVariable("WIN_CSC_LINK","User")
          $env:WIN_CSC_KEY_PASSWORD = [Environment]::GetEnvironmentVariable("WIN_CSC_KEY_PASSWORD","User")
          "CSC_LINK=$env:CSC_LINK" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CSC_KEY_PASSWORD=$env:CSC_KEY_PASSWORD" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "WIN_CSC_LINK=$env:WIN_CSC_LINK" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "WIN_CSC_KEY_PASSWORD=$env:WIN_CSC_KEY_PASSWORD" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run release candidate gates
        run: npm run release:candidate

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: crossdrive-signed-release
          path: dist/*
          retention-days: 30

      - name: Publish GitHub release for updater
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart("v")
          $setupExe = "dist\CrossDriveSetup.exe"
          $portableExe = "dist\CrossDrive-$version.exe"
          if (-not (Test-Path $setupExe)) { throw "Missing updater installer asset: $setupExe" }
          if (-not (Test-Path $portableExe)) { throw "Missing portable asset: $portableExe" }

          $hash = (Get-FileHash $setupExe -Algorithm SHA256).Hash.ToLower()
          $notesSource = if (Test-Path "RELEASE_NOTES.md") { Get-Content "RELEASE_NOTES.md" -Raw } else { "CrossDrive $tag" }
          $notesPath = Join-Path $env:RUNNER_TEMP "crossdrive-release-notes.md"
          Set-Content -Path $notesPath -Value "$notesSource`n`nSHA256: $hash`n" -Encoding UTF8

          if (gh release view $tag --repo "${{ github.repository }}" *> $null) {
            gh release edit $tag --repo "${{ github.repository }}" --title $tag --notes-file $notesPath --latest
            gh release upload $tag --repo "${{ github.repository }}" $setupExe $portableExe --clobber
          } else {
            gh release create $tag --repo "${{ github.repository }}" --title $tag --notes-file $notesPath --latest $setupExe $portableExe
          }
